# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
default: &default
  adapter: sqlite3
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: storage/development.sqlite3

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: storage/test.sqlite3

# Production uses PostgreSQL via environment variables
# Set DATABASE_URL or individual connection parameters:
#   DATABASE_URL=postgresql://user:password@hostname:port/database
#   Or use individual env vars: DB_HOST, DB_USER, DB_PASSWORD, DB_NAME
production:
  primary:
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
    port: <%= ENV.fetch("DB_PORT") { 5432 } %>
    username: <%= ENV.fetch("DB_USER") { "postgres" } %>
    password: <%= ENV.fetch("DB_PASSWORD") { "" } %>
    database: <%= ENV.fetch("DB_NAME") { "learnexis_production" } %>
    # Use DATABASE_URL if provided (takes precedence over individual vars)
    <% if ENV["DATABASE_URL"] %>
    url: <%= ENV["DATABASE_URL"] %>
    <% end %>
  cache:
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
    port: <%= ENV.fetch("DB_PORT") { 5432 } %>
    username: <%= ENV.fetch("DB_USER") { "postgres" } %>
    password: <%= ENV.fetch("DB_PASSWORD") { "" } %>
    database: <%= ENV.fetch("DB_CACHE_NAME") { "learnexis_production_cache" } %>
    migrations_paths: db/cache_migrate
    <% if ENV["DATABASE_CACHE_URL"] %>
    url: <%= ENV["DATABASE_CACHE_URL"] %>
    <% end %>
  queue:
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
    port: <%= ENV.fetch("DB_PORT") { 5432 } %>
    username: <%= ENV.fetch("DB_USER") { "postgres" } %>
    password: <%= ENV.fetch("DB_PASSWORD") { "" } %>
    database: <%= ENV.fetch("DB_QUEUE_NAME") { "learnexis_production_queue" } %>
    migrations_paths: db/queue_migrate
    <% if ENV["DATABASE_QUEUE_URL"] %>
    url: <%= ENV["DATABASE_QUEUE_URL"] %>
    <% end %>
  cable:
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
    port: <%= ENV.fetch("DB_PORT") { 5432 } %>
    username: <%= ENV.fetch("DB_USER") { "postgres" } %>
    password: <%= ENV.fetch("DB_PASSWORD") { "" } %>
    database: <%= ENV.fetch("DB_CABLE_NAME") { "learnexis_production_cable" } %>
    migrations_paths: db/cable_migrate
    <% if ENV["DATABASE_CABLE_URL"] %>
    url: <%= ENV["DATABASE_CABLE_URL"] %>
    <% end %>